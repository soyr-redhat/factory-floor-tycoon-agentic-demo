apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: factory-backend
  namespace: factory-floor-tycoon
spec:
  triggers:
  - type: ConfigChange
  - type: GitHub
    github:
      secret: github-webhook-secret
  source:
    type: Git
    git:
      uri: https://github.com/soyr-redhat/factory-floor-tycoon-agentic-demo.git
    contextDir: backend
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: factory-backend:latest
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: factory-frontend
  namespace: factory-floor-tycoon
spec:
  triggers:
  - type: ConfigChange
  - type: GitHub
    github:
      secret: github-webhook-secret
  source:
    type: Git
    git:
      uri: https://github.com/soyr-redhat/factory-floor-tycoon-agentic-demo.git
    contextDir: frontend
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
      buildArgs:
      - name: VITE_API_URL
        value: https://factory-backend-factory-floor-tycoon.apps.ocp.cloud.rhai-tmm.dev
  output:
    to:
      kind: ImageStreamTag
      name: factory-frontend:latest
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: factory-backend
  namespace: factory-floor-tycoon
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: factory-frontend
  namespace: factory-floor-tycoon
